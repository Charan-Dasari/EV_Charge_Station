<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f0e8" />
  <meta name="description" content="ChargeSaathi - EV Charging Station Locator for India" />

  <!-- Google Fonts — preconnect before stylesheets so TCP handshake is done early -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- font-display=swap prevents render blocking while fonts download -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400;1,600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />

  <!-- App icons -->
  <link rel="icon" href="%PUBLIC_URL%/logo.jpg" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.jpg" />
  <title>ChargeSaathi</title>

  <!-- Map tile servers — browser starts TCP/TLS handshake before JS loads -->
  <link rel="preconnect" href="https://tile.openstreetmap.org" />
  <link rel="dns-prefetch" href="https://tile.openstreetmap.org" />
  <link rel="preconnect" href="https://a.basemaps.cartocdn.com" />
  <link rel="dns-prefetch" href="https://a.basemaps.cartocdn.com" />
  <link rel="preconnect" href="https://b.basemaps.cartocdn.com" />
  <link rel="dns-prefetch" href="https://b.basemaps.cartocdn.com" />
  <link rel="preconnect" href="https://c.basemaps.cartocdn.com" />
  <link rel="dns-prefetch" href="https://c.basemaps.cartocdn.com" />
  <link rel="preconnect" href="https://server.arcgisonline.com" />
  <link rel="dns-prefetch" href="https://server.arcgisonline.com" />

  <!-- External APIs -->
  <link rel="preconnect" href="https://api.openchargemap.io" />
  <link rel="dns-prefetch" href="https://api.openchargemap.io" />
  <link rel="preconnect" href="https://overpass-api.de" />
  <link rel="dns-prefetch" href="https://overpass-api.de" />

  <!-- CDN for Leaflet default icons -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />

  <!-- Leaflet CSS — loaded early so map renders without FOUC -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body>
  <noscript>You need to enable JavaScript to run ChargeSaathi.</noscript>
  <div id="root"></div>
</body>

</html>
